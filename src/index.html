<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data: blob: 'unsafe-inline'; frame-src *; style-src * 'unsafe-inline';">
  <title>EloCoach</title>
</head>

<body>
  <div id="coach-hud" class="coach-hud" data-widget-id="coach-hud" data-mode="idle">
    <div class="drag-handle">EloCoach</div>
    <div class="hud-grid">
      <div id="wave-section" class="section is-hidden">
        <div class="label">Wave</div>
        <div id="wave-timer" class="timer">--:--</div>
      </div>
      <div id="gank-section" class="section is-hidden">
        <div class="label">Risco</div>
        <div id="gank-alert" class="alert seguro">Baixo</div>
      </div>
    </div>
    <div id="gank-hypothesis" class="status"></div>
    <div id="game-status" class="status">Aguardando partida</div>
    <div id="jungler-info" class="jungler is-hidden">Jungler: Desconhecido</div>
    <div id="enemy-team" class="enemy-team is-hidden">
      <div class="label">Inimigos</div>
      <div id="enemy-champions" class="enemy-champions"></div>
    </div>
  </div>
</body>

</html>
